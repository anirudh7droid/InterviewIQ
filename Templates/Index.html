<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewIQ</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2f6 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .upload-container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Logo Design */
        .logo-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--primary);
        }

        h3 {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
            margin: 0 0 2rem 0;
        }

        /* Drag & Drop Zone Appearance */
        .drop-zone {
            border: 2px dashed #cbd5e1;
            padding: 2rem 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #f8fafc;
            margin-bottom: 2rem;
            position: relative;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background-color: #f0fdf4;
        }

        .drop-zone-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .drop-zone-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Hidden standard file input styled via label */
        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
        }

        button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="upload-container">
        
        <!-- Smart Logo Layout -->
        <div class="logo-wrapper">
            <div class="logo-icon">iQ</div>
            <div class="logo-text">Interview<span>IQ</span></div>
        </div>

        <h3>Elevate your resume evaluation</h3>

        <form action="/upload" method="POST" enctype="multipart/form-data">
            
            <!-- Modern Upload Box -->
            <div class="drop-zone">
                <span class="drop-zone-icon">📁</span>
                <span class="drop-zone-text">Click to browse or drag PDF here</span>
                <input type="file" name="resume" accept=".pdf" required>
            </div>

            <button type="submit">
                Upload Resume
            </button>

        </form>

    </div>

</body>
</html>
